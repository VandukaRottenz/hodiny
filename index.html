<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vandukas Clock</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400&family=Stardos+Stencil:wght@400&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.cdnfonts.com/css/product-sans');
        @import url('https://fonts.cdnfonts.com/css/seven-segment');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; color: white;
            font-family: 'Product Sans', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            user-select: none; cursor: none;
        }

        #time {
            font-size: 30vw; 
            font-weight: 400;
            display: flex; align-items: center;
            letter-spacing: -0.02em;
            transition: font-family 0.2s ease;
        }

        .f-google { font-family: 'Product Sans', sans-serif; }
        .f-oswald { font-family: 'Oswald', sans-serif; }
        .f-stencil { font-family: 'Stardos Stencil', serif; }
        .f-lcd { font-family: 'Seven Segment', sans-serif; letter-spacing: 0.05em; }

        #sep { animation: blink 1s step-start infinite; padding: 0 0.05em; }
        @keyframes blink { 50% { opacity: 0; } }

        #ui {
            position: fixed; top: 20px; right: 20px;
            background: rgba(30, 30, 30, 0.95);
            padding: 18px; border-radius: 14px;
            display: flex; flex-direction: column; gap: 10px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s; z-index: 100;
            border: 1px solid #444;
            min-width: 180px;
        }

        #ui.visible { opacity: 1; visibility: visible; }

        #font-label {
            color: #4da3ff; font-weight: bold; font-size: 13px;
            margin-bottom: 4px; font-family: sans-serif;
        }

        button {
            cursor: pointer; padding: 10px; border-radius: 8px;
            border: none; background: #555; color: white;
            font-size: 13px; font-weight: 500;
        }

        button:hover { background: #666; }
        input[type=range] { width: 100%; cursor: pointer; }
        label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        body.active { cursor: default; }
    </style>
</head>
<body onmousemove="showUI()" onclick="showUI()" ontouchstart="showUI()">

    <div id="time" class="f-google">
        <span id="h">00</span><span id="sep">:</span><span id="m">00</span>
    </div>

    <div id="ui">
        <label>Štýl písma</label>
        <div id="font-label">Google Sans</div>

        <label>Veľkosť</label>
        <input type="range" min="10" max="95" value="30" oninput="updateSize(this.value)">
        
        <label>Ovládanie</label>
        <button onclick="changeFont()">Zmeniť font</button>
        <button onclick="toggleFS()">Fullscreen</button>
    </div>

    <script>
        let timer;
        const fontData = [
            { id: 'f-google', n: 'Google Sans' },
            { id: 'f-oswald', n: 'Oswald' },
            { id: 'f-stencil', n: 'Stardos Stencil' },
            { id: 'f-lcd', n: 'LCD Digital' }
        ];
        let idx = 0;

        function updateClock() {
            const d = new Date();
            document.getElementById('h').textContent = String(d.getHours()).padStart(2, '0');
            document.getElementById('m').textContent = String(d.getMinutes()).padStart(2, '0');
        }

        function changeFont() {
            const clock = document.getElementById('time');
            const label = document.getElementById('font-label');
            clock.classList.remove(fontData[idx].id);
            idx = (idx + 1) % fontData.length;
            clock.classList.add(fontData[idx].id);
            label.textContent = fontData[idx].n;
            showUI(); 
        }

        function toggleFS() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {
                    alert("Fullscreen nie je podporovaný vaším prehliadačom.");
                });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function updateSize(v) {
            document.getElementById('time').style.fontSize = v + 'vw';
        }

        function showUI() {
            document.getElementById('ui').classList.add('visible');
            document.body.classList.add('active');
            clearTimeout(timer);
            timer = setTimeout(hideUI, 3500);
        }

        function hideUI() {
            document.getElementById('ui').classList.remove('visible');
            document.body.classList.remove('active');
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
