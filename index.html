<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sans Digitálne Hodiny</title>
    <link href="https://fonts.googleapis.com/css2?family=Product+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: white;
            /* Priorita pre Google Sans / Product Sans */
            font-family: 'Product Sans', 'Google Sans', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            cursor: none; /* Štandardne skrytý kurzor */
        }

        #clock-container {
            text-align: center;
        }

        #time {
            font-size: 30vw; 
            font-weight: 400;
            display: flex;
            align-items: center;
            letter-spacing: -0.02em;
        }

        /* Blikajúca dvojbodka */
        #separator {
            animation: blink 1s step-start infinite;
            padding: 0 0.05em;
            position: relative;
            top: -0.05em; /* Jemná korekcia výšky dvojbodky pre tento font */
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Nastavenia - Overlay */
        #settings-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.9);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s;
            z-index: 100;
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #settings-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        /* Ovládacie prvky v nastaveniach */
        button {
            cursor: pointer;
            padding: 10px 15px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            background: #444;
            color: white;
            transition: background 0.2s;
        }

        button:hover {
            background: #666;
        }

        input[type=range] {
            cursor: pointer;
            width: 200px;
        }

        label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Zobrazenie kurzora pri aktivite */
        body.ui-active {
            cursor: default;
        }
    </style>
</head>
<body onmousemove="resetTimer()" onclick="resetTimer()">

    <div id="clock-container">
        <div id="time">
            <span id="hours">00</span>
            <span id="separator">:</span>
            <span id="minutes">00</span>
        </div>
    </div>

    <div id="settings-overlay" id="ui">
        <label>Veľkosť hodín</label>
        <input type="range" id="sizeSlider" min="10" max="90" value="30" oninput="changeSize(this.value)">
        
        <button onclick="toggleFullScreen()">Prepnúť Fullscreen</button>
        <button onclick="hideUI()">Zavrieť teraz</button>
    </div>

    <script>
        let idleTimer;
        const overlay = document.getElementById('settings-overlay');

        // 1. Aktualizácia času (24h formát)
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById('hours').textContent = h;
            document.getElementById('minutes').textContent = m;
        }

        // 2. Logika zobrazenia a automatického skrytia UI
        function resetTimer() {
            // Zobraziť UI a kurzor
            overlay.classList.add('visible');
            document.body.classList.add('ui-active');

            // Zrušiť predchádzajúci časovač
            clearTimeout(idleTimer);

            // Nastaviť nový časovač na 5 sekúnd
            idleTimer = setTimeout(hideUI, 5000);
        }

        function hideUI() {
            overlay.classList.remove('visible');
            document.body.classList.remove('ui-active');
        }

        // 3. Zmena veľkosti písma
        function changeSize(val) {
            document.getElementById('time').style.fontSize = val + 'vw';
        }

        // 4. Fullscreen funkcia
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Spustenie
        setInterval(updateClock, 1000);
        updateClock();
        
        // Inicializácia skrytia pri načítaní
        idleTimer = setTimeout(hideUI, 5000);
    </script>
</body>
</html>
